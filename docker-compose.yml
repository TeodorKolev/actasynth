version: '3.8'

services:
  # Main application service
  api:
    build:
      context: .
      dockerfile: Dockerfile.simple
    container_name: agentops-api
    ports:
      - "8000:8000"
    environment:
      # API Keys (use .env file in production)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

      # LangSmith
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-true}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-agentops-studio}

      # Database
      - DATABASE_URL=postgresql+asyncpg://agentops:agentops@postgres:5432/agentops
      - REDIS_URL=redis://redis:6379/0

      # Storage
      - S3_BUCKET=${S3_BUCKET:-agentops-artifacts}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin

      # Service
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - WORKERS=4
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    networks:
      - agentops-network

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: agentops-postgres
    environment:
      - POSTGRES_USER=agentops
      - POSTGRES_PASSWORD=agentops
      - POSTGRES_DB=agentops
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentops-network

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: agentops-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentops-network

  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: agentops-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - agentops-network

  # Prometheus for metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: agentops-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - agentops-network

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: agentops-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - agentops-network

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  agentops-network:
    driver: bridge
